name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # OIDC token request — used both by npm Trusted Publishing (no NPM_TOKEN
  # secret needed) and by `npm publish --provenance` to attest the artifact.
  id-token: write

jobs:
  # Builds the multi-platform binaries, publishes the GitHub Release with
  # tarballs + checksums, and — via the brews: block in .goreleaser.yaml —
  # pushes an updated Formula/hermai.rb to hermai-ai/homebrew-hermai.
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `repo` scope on hermai-ai/homebrew-hermai.
          # The default GITHUB_TOKEN can't push to a sibling org repo;
          # this is stored as an org-level secret scoped to hermai-cli.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  # Publishes hermai-cli to npmjs.com via Trusted Publishing (OIDC).
  #
  # The wrapper is a thin postinstall-downloader that pulls the right platform
  # binary from the GitHub release goreleaser just published, so this job runs
  # after goreleaser succeeds.
  #
  # Shape follows npm's canonical example verbatim
  # (https://docs.npmjs.com/trusted-publishers):
  #   - Node 24 bundles npm 11.12+ natively (Trusted Publishing requires 11.5+),
  #     so no corepack or self-upgrade dance.
  #   - No NODE_AUTH_TOKEN — when `id-token: write` is granted and the package
  #     has a matching trusted-publisher entry on npmjs.com, npm detects the
  #     OIDC context and authenticates automatically.
  #   - Trusted Publisher registration on npmjs.com → /package/hermai-cli/access:
  #       Publisher: GitHub Actions
  #       Organization: hermai-ai
  #       Repository:   hermai-cli
  #       Workflow:     release.yml
  #       Environment:  (blank)
  npm:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Confirm npm version supports Trusted Publishing
        run: |
          npm --version
          node --version

      - name: Align package version with tag
        working-directory: npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting npm version to $VERSION"
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      - name: Publish
        working-directory: npm
        run: npm publish --provenance --access public
